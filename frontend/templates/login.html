<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BlockVerify Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090E;
      --surface: #12121A;
      --surface2: #1A1A26;
      --border: rgba(124,107,255,.15);
      --border2: rgba(124,107,255,.3);
      --accent: #7C6BFF;
      --accent2: #AFA9EC;
      --accent-dim: rgba(124,107,255,.12);
      --text: #E8E6FF;
      --text2: #8A87B0;
      --text3: #4A476A;
      --red: #FF4E6A;
      --red-dim: rgba(255,78,106,.12);
      --radius: 12px;
      --radius-sm: 8px;
      --font: 'Space Grotesk', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; display: flex; align-items: center; justify-content: center; }

    .login-container {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px; width: 100%; max-width: 400px;
    }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .page-title { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 8px; }
    .page-sub { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 30px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 12px 14px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: var(--font); font-size: 14px; transition: border-color .2s;
    }
    input:focus { outline: none; border-color: var(--accent); }

    .btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px;
      font-size: 14px; font-weight: 600; padding: 12px 18px; margin-top: 10px;
      border-radius: var(--radius-sm); cursor: pointer;
      background: var(--accent); color: #fff; border: none; font-family: var(--font); transition: all .15s;
    }
    .btn:hover { background: #9D8FFF; }

    .error-msg {
      background: var(--red-dim); color: var(--red);
      padding: 12px; border-radius: var(--radius-sm); border: 1px solid rgba(255,78,106,.3);
      font-size: 13px; margin-bottom: 20px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-icon">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="page-title">Admin Login</div>
    <div class="page-sub">Secure access to BlockVerify Dashboard</div>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form action="/login" method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div style="font-size: 12px; color: var(--text3); text-align: center; margin-top: 20px;">
      <a href="/" style="color: var(--accent2); text-decoration: none;">Return to public dashboard</a>
    </div>
  </div>
</body>
</html>
